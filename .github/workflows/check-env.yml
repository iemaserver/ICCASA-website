name: Echo Variables

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Echo variable
        run: |
          echo "$FIREBASE_PROJECT_ID"
          echo "$FIREBASE_SERVICE_ACCOUNT"
